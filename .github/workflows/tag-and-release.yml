name: Auto Tag & Release

# Trigger when Cargo.toml changes on master
on:
  push:
    branches: [master]
    paths:
      - Cargo.toml

env:
  CARGO_TERM_COLOR: always

jobs:
  tag:
    name: Tag new version
    runs-on: ubuntu-latest
    permissions:
      contents: write
      checks: read
    # Map the step outputs to job outputs so the next job can read them
    outputs:
      tag_name: ${{ steps.ver.outputs.tag }}
      did_tag: ${{ steps.check.outputs.exists == 'false' }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # Need full history to check existing tags

      - name: Read version from Cargo.toml
        id: ver
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Skip if tag already exists
        id: check
        run: |
          if git rev-parse "${{ steps.ver.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for CI to pass before tagging
        if: steps.check.outputs.exists == 'false'
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: Build & Test   # This perfectly matches the job name in your ci.yml
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15

      - name: Push tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.ver.outputs.tag }}"
          git push origin "${{ steps.ver.outputs.tag }}"

  build-and-release:
    name: Build release binary
    needs: tag # Explicitly wait for the tag job to finish
    if: needs.tag.outputs.did_tag == 'true' # Only execute if a tag was actually created
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    permissions:
      contents: write   # Needed to create GitHub releases
    steps:
      - name: Install dependencies
        run: pacman -Syu --noconfirm --needed git base-devel rust cargo

      - uses: actions/checkout@v5
        with:
          # Pull the exact tag we just created in the previous job
          ref: ${{ needs.tag.outputs.tag_name }}

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: arch-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: arch-cargo-release-

      - name: Build (release)
        run: cargo build --release

      - name: Run tests before publishing
        run: cargo test

      - name: Rename binary
        run: |
          mkdir -p dist
          # Use the tag name dynamically passed from the first job
          cp target/release/rtte dist/rtte-${{ needs.tag.outputs.tag_name }}-x86_64-linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "rtte ${{ needs.tag.outputs.tag_name }}"
          tag_name: ${{ needs.tag.outputs.tag_name }}
          body: |
            See [README](https://github.com/${{ github.repository }}/blob/master/README.md) for installation instructions.
          files: dist/rtte-${{ needs.tag.outputs.tag_name }}-x86_64-linux
          generate_release_notes: true
