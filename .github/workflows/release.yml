name: Release

# Triggered when a version tag is pushed, e.g.:
#   git tag v0.2.0 && git push --tags
on:
  push:
    tags:
      - 'v[0-9]*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    name: Build release binary
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    permissions:
      contents: write   # needed to create GitHub releases
    steps:
      - name: Install dependencies
        run: pacman -Syu --noconfirm --needed git base-devel rust cargo

      - uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: arch-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: arch-cargo-release-

      - name: Build (release)
        run: cargo build --release --locked

      - name: Run tests before publishing
        run: cargo test --locked

      # Rename the binary to include the version tag so the asset name is clear
      - name: Rename binary
        run: |
          mkdir -p dist
          cp target/release/rtte dist/rtte-${{ github.ref_name }}-x86_64-linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "rtte ${{ github.ref_name }}"
          body: |
            See [README](https://github.com/${{ github.repository }}/blob/main/README.md) for installation instructions.
          files: dist/rtte-${{ github.ref_name }}-x86_64-linux
          generate_release_notes: true
