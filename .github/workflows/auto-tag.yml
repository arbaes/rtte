name: Auto Tag

# When Cargo.toml changes on main, read the version and push a tag if it
# doesn't exist yet. The tag push triggers release.yml automatically.
on:
  push:
    branches: [main]
    paths:
      - Cargo.toml

jobs:
  tag:
    name: Tag new version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history to check existing tags

      - name: Read version from Cargo.toml
        id: ver
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Skip if tag already exists
        id: check
        run: |
          if git rev-parse "${{ steps.ver.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for CI to pass before tagging
        if: steps.check.outputs.exists == 'false'
        uses: lewagon/wait-on-check-action@v1.6.1
        with:
          ref: ${{ github.sha }}
          check-name: Build & Test   # must match the job name in ci.yml
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15

      - name: Push tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.ver.outputs.tag }}"
          git push origin "${{ steps.ver.outputs.tag }}"
